worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log  /dev/stdout;
    error_log   /dev/stderr;
    sendfile        on;
    keepalive_timeout  65;

    # SSL Configuration
    # ssl_certificate     /etc/nginx/certs/domain.pem;
    # ssl_certificate_key /etc/nginx/certs/domain.key;

    # server {
    #     listen 80;
    #     server_name staging-marquez-web.nubank.world;

    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name staging-marquez-web.nubank.world;

        # ssl_certificate     /etc/nginx/certs/domain.pem;
        # ssl_certificate_key /etc/nginx/certs/domain.key;

        # Health Check Endpoint
        location /healthcheck {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # OAuth2 Proxy Configuration (Consolidated)
        location /oauth2/ {
            proxy_pass         http://marquez-web-oauth2-proxy:4180;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Scheme $scheme;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Protect Frontend Routes
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/sign_in;

            proxy_pass         http://marquez-web-ui:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_set_header X-User-Email $upstream_http_x_auth_request_user;
        }

        # OAuth2 Authentication Request
        location /oauth2/auth {
            proxy_pass         http://marquez-web-oauth2-proxy:4180/oauth2/auth;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Original-URI $request_uri;
            proxy_set_header   X-Original-Method $request_method;
            proxy_set_header   Content-Length "";
            proxy_pass_request_body off;
        }

        # Sign-In Endpoint
        location /oauth2/sign_in {
            proxy_pass http://marquez-web-oauth2-proxy:4180/start?rd=https://$host$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }

        # Sign-Out Endpoint
        location /logout {
            proxy_pass http://marquez-web-oauth2-proxy:4180/sign_out?rd=https://staging-marquez-web.nubank.world;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }
    }
}