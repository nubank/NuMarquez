worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log  /dev/stdout;
    error_log   /dev/stderr;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name staging-marquez-web.nubank.world;

        # Health Check Endpoint
        location /healthcheck {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # OAuth2 Proxy Configuration (Consolidated)
        location /oauth2/ {
            proxy_pass         http://marquez-web-oauth2-proxy:4180;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Scheme $scheme;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Protect Frontend Routes
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start;
            auth_request_set $email  $upstream_http_x_auth_request_email;
            proxy_set_header X-Email $email;
            auth_request_set $x_okta_user $upstream_http_x_auth_request_preferred_username;
            proxy_set_header X-Forwarded-User $x_okta_user;
            proxy_set_header X-Forwarded-Roles $upstream_http_x_auth_request_groups;
            auth_request_set $token  $upstream_http_x_auth_request_access_token;
            proxy_set_header X-Access-Token $token;
            auth_request_set $groups  $upstream_http_x_auth_request_groups;

            auth_request_set $auth_cookie $upstream_http_set_cookie;
            add_header Set-Cookie $auth_cookie;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host:80;
            proxy_set_header X-Forwarded-Port 80;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-Proto http;

            proxy_http_version 1.1; 
            proxy_pass         http://marquez-web-ui:3000;
            # proxy_set_header   Host $host;
            # proxy_set_header   X-Real-IP $remote_addr;
            # proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header   X-Forwarded-Proto $scheme;

            # proxy_set_header X-User-Email $upstream_http_x_auth_request_user;
        }

        # OAuth2 Authentication Request
        location /oauth2/auth {
            internal;
            proxy_pass         http://marquez-web-oauth2-proxy:4180/auth;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Scheme         $scheme;
            proxy_set_header Content-Length   "";
            proxy_pass_request_body           off;
        }

        # Sign-In Endpoint
        location /oauth2/sign_in {
            proxy_pass http://marquez-web-oauth2-proxy:4180/start?rd=https://$host$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }

        # Sign-Out Endpoint
        location /logout {
            proxy_pass http://marquez-web-oauth2-proxy:4180/sign_out?rd=https://staging-marquez-web.nubank.world;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }
    }
}