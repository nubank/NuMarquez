#nginx.conf
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Include mime types
    include       mime.types;
    default_type  application/octet-stream;
    
    # Increase the buffer size for large headers
    large_client_header_buffers 4 16k;

    # Logging Settings
    access_log  /dev/stdout;
    error_log   /dev/stderr;

    # Keepalive Timeout
    keepalive_timeout 65;

    upstream marquez_api_read_only {
        server marquez-api-read-only:80;
        server marquez-api-read-only:5000;
        server marquez-api-read-only:5001;
    }

    upstream marquez_api_write {
        server marquez-api-write:80;
        server marquez-api-write:5000;
        server marquez-api-write:5001;
    }

    # server {
    #     listen 80;
    #     server_name staging-marquez-web.nubank.world;

    #     # Real IP Header Configuration
    #     set_real_ip_from
    #     real_ip_header X-Forwarded-For;
    #     real_ip_recursive on;

    #     # Health Check Endpoint
    #     location /healthcheck {
    #         access_log off;
    #         return 200 'OK';
    #         add_header Content-Type text/plain;
    #     }

    server {
        # listen 443 ssl http2;
        listen 80;
        server_name staging-marquez-web.nubank.world;

        # Real IP Header Configuration
        set_real_ip_from 10.140.0.0/16;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # Health Check Endpoint
        location /healthcheck {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # SSL Configuration
        # ssl_certificate /etc/nginx/ssl/staging-marquez-web.nubank.world.crt;
        # ssl_certificate_key /etc/nginx/ssl/staging-marquez-web.nubank.world.key;

        # OAuth2 Proxy Configuration
        location /oauth2/ {
            proxy_pass         http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # OAuth2 Authentication Request
        location /oauth2/auth {
            internal;
            proxy_pass          http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180/auth;
            proxy_set_header    Host             $host;
            proxy_set_header    X-Real-IP        $remote_addr;
            proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Content-Length   "";
            proxy_pass_request_body off;
        }

        # Authentication Start Endpoint
        location /oauth2/start {
            proxy_pass         http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Auth-Request-Redirect $request_uri;
        }

        # Sign-Out Endpoint
        location /logout {
            proxy_pass          http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180/sign_out?rd=http://staging-marquez-web.nubank.world;
            proxy_set_header    Host                   $host;
            proxy_set_header    X-Real-IP              $remote_addr;
            proxy_set_header    X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto      $scheme;
            proxy_set_header    X-Auth-Request-Redirect $request_uri;
        }

        # **Allow Access to marquez-api-read-only Endpoint**
        location /datasets {
            proxy_pass http://marquez-api-read-only;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # **Allow Access to marquez-api-read-only Endpoint**
        location /jobs {
            proxy_pass http://marquez-api-read-only;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

                # **Allow Access to marquez-api-read-only Endpoint**
        location /events {
            proxy_pass http://marquez-api-read-only;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Protect Frontend Routes
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start;

            # Pass query parameters to the backend
            proxy_pass http://marquez-web-ui:80$request_uri;

            # Proxy Headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;

            # Pass user information to the backend
            auth_request_set $email           $upstream_http_x_auth_request_email;
            proxy_set_header X-Email          $email;

            auth_request_set $x_okta_user     $upstream_http_x_auth_request_preferred_username;
            proxy_set_header X-Forwarded-User $x_okta_user;

            auth_request_set $token           $upstream_http_x_auth_request_access_token;
            proxy_set_header X-Access-Token   $token;

            auth_request_set $groups          $upstream_http_x_auth_request_groups;
            # proxy_set_header X-Forwarded-Roles $groups;

            # Handle Cookie Refresh
            auth_request_set $auth_cookie     $upstream_http_set_cookie;
            add_header Set-Cookie               $auth_cookie;
            
            # Pass additional user information
            auth_request_set $user            $upstream_http_x_auth_request_user;
            proxy_set_header X-User            $user;

            # Ensure that the request body is not sent to the authentication server
            proxy_pass_request_body off;
        }
    }
}