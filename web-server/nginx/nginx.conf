worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    map $http_x_forwarded_proto $real_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
    }

    # Include mime types
    include       mime.types;
    default_type  application/octet-stream;
    
    # Increase the buffer size for large headers
    large_client_header_buffers 4 16k;

    # Logging Settings
    access_log  /dev/stdout;
    error_log   /dev/stderr;

    # Keepalive Timeout
    keepalive_timeout 65;

    # log_format combined '$proxy_protocol_addr - $remote_user [$time_local] '
    #                 '"$request" $status $body_bytes_sent '
    #                 '"$http_referer" "$http_user_agent"';

    upstream marquez_api_read_only {
        server marquez-api-read-only:80;
        server marquez-api-read-only:5000;
        server marquez-api-read-only:5001;
    }

    server {
        listen 80;
        server_name staging-marquez-web.nubank.world;

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    server { 
        listen 443 ssl http2;
        # proxy_protocol on;
        server_name staging-marquez-web.nubank.world;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/cert-key.pem;

        # Real IP Header Configuration
        set_real_ip_from 10.140.0.0/16;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # Health Check Endpoint
        location /healthcheck {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # OAuth2 Proxy Configuration
        location /oauth2/ {
            proxy_pass http://marquez-web-oauth2-proxy:4180/oauth2/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $real_scheme;
        }

        # Protect Frontend Routes
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start;
            error_page 403 = /error/403.html;

            # Proxy to the backend application
            proxy_pass http://marquez-web-ui:80;

            # Proxy Headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;

            # Pass user information to the backend
            auth_request_set $user             $upstream_http_x_auth_request_user;
            proxy_set_header X-User            $user;

            # Handle Cookie Refresh
            auth_request_set $auth_cookie      $upstream_http_set_cookie;
            add_header Set-Cookie              $auth_cookie;

            # Ensure that the request body is not sent to the authentication server
            proxy_pass_request_body on;
            proxy_set_header Content-Length $content_length;
            proxy_set_header Content-Type $content_type;
        }

        # OAuth2 Authentication Request
        location = /oauth2/auth {
            internal;
            proxy_pass http://marquez-web-oauth2-proxy:4180/oauth2/auth;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # Authentication Start Endpoint
        location /oauth2/start {
            proxy_pass http://marquez-web-oauth2-proxy:4180/start?$args;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $real_scheme;
            proxy_set_header   X-Auth-Request-Redirect $request_uri;
        }

        # Sign-Out Endpoint
        location /logout {
            proxy_pass http://marquez-web-oauth2-proxy:4180/sign_out?rd=http://staging-marquez-web.nubank.world;
            proxy_set_header    Host                   $host;
            proxy_set_header    X-Real-IP              $remote_addr;
            proxy_set_header    X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto      $real_scheme;
            proxy_set_header    X-Auth-Request-Redirect $request_uri;
        }

        # Error Handling
        location /error/403.html {
            internal;
            return 403 'Access Denied';
        }

        # Allow Access to marquez-api-read-only Endpoint
        location /datasets {
            proxy_pass http://marquez-api-read-only/datasets;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }

        # Allow Access to marquez-api-read-only Endpoint
        location /api/v2beta {
            proxy_pass http://marquez-api-read-only/api/v2beta;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $real_scheme;
        }

        # Allow Access to marquez-api-read-only Endpoint
        location /api/v1 {
            proxy_pass http://marquez-api-read-only/api/v1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }

        location /api/v1/stats/datasets {
            proxy_pass http://marquez-web-ui:80/api/v1/stats/datasets;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }

        location /api/v1/stats/sources {
            proxy_pass http://marquez-web-ui:80/api/v1/stats/sources;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }
        
    }
}