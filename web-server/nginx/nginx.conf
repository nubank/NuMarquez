events {
    worker_connections 4096;
}

http {
    server_tokens off;

    # Include mime types
    include       mime.types;
    default_type  application/octet-stream;
    
    # Increase the buffer size for large headers
    large_client_header_buffers 4 16k;

    # Allow invalid characters in URIs
    ignore_invalid_headers off;
    underscores_in_headers on;

    # Logging Settings
    access_log  /dev/stdout;
    error_log   /dev/stderr;

    # Keepalive Timeout
    keepalive_timeout 65;

    server {
        listen 80;
        server_name staging-marquez-web.nubank.world;

        return 301 https://$host$request_uri;        
    }

    # HTTPS Server Block
    server {
        listen 443 ssl;
        server_name staging-marquez-web.nubank.world;

        # SSL Configuration
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # OCSP Stapling
        root   /usr/local/openresty/nginx/html;
        index  index.html index.htm;       

        # Health Check Endpoint
        location /healthcheck {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # OAuth2 Proxy Configuration
        location /oauth2/ {
            proxy_pass         http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Authentication Start Endpoint
        location /oauth2/start {
            proxy_pass         http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180/start;
            proxy_set_header   Host                   $host;
            proxy_set_header   X-Real-IP              $remote_addr;
            proxy_set_header   X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto      $scheme;
            proxy_set_header   X-Auth-Request-Redirect $request_uri;
        }

        # OAuth2 Authentication Request
        location /oauth2/auth {
            internal;
            proxy_pass          http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180/auth;
            proxy_set_header    Host             $host;
            proxy_set_header    X-Real-IP        $remote_addr;
            proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Content-Length   "";
            proxy_pass_request_body off;
        }

        # Sign-Out Endpoint
        location /logout {
            proxy_pass          http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180/sign_out?rd=https://staging-marquez-web.nubank.world;
            proxy_set_header    Host                   $host;
            proxy_set_header    X-Real-IP              $remote_addr;
            proxy_set_header    X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto      $scheme;
            proxy_set_header    X-Auth-Request-Redirect $request_uri;
        }

        # Protect Frontend Routes
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start;

            # Pass query parameters to the backend
            proxy_pass http://marquez-web-ui:80$request_uri;

            # Proxy Headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;

            # Pass user information to the backend
            auth_request_set $email           $upstream_http_x_auth_request_email;
            proxy_set_header X-Email          $email;

            auth_request_set $x_okta_user     $upstream_http_x_auth_request_preferred_username;
            proxy_set_header X-Forwarded-User $x_okta_user;

            auth_request_set $token           $upstream_http_x_auth_request_access_token;
            proxy_set_header X-Access-Token   $token;

            auth_request_set $groups          $upstream_http_x_auth_request_groups;
            # Consider dynamically setting roles if applicable
            # proxy_set_header X-Forwarded-Roles $groups;

            # Handle Cookie Refresh
            auth_request_set $auth_cookie     $upstream_http_set_cookie;
            add_header Set-Cookie               $auth_cookie;
            
            # Pass additional user information
            auth_request_set $user            $upstream_http_x_auth_request_user;
            proxy_set_header X-User            $user;

            # Ensure that the request body is not sent to the authentication server
            proxy_pass_request_body off;
        }

        # Marquez producer endpoint
        location /api/ {
            proxy_pass http://staging-openlineage-events-producer.nubank.world; # Replace with your backend service and port
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase Timeouts
            proxy_connect_timeout 600;
            proxy_send_timeout 600;
            proxy_read_timeout 600;
            send_timeout 600;
        }

    }
}