worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log  /dev/stdout;
    error_log   /dev/stderr;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name marquez-web.nubank.world;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name staging-marquez-web.nubank.world;

        ssl_certificate     /etc/nginx/certs/domain.crt;
        ssl_certificate_key /etc/nginx/certs/domain.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;

        # Health Check Endpoint
        location /healthcheck {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # OAuth2 Proxy Configuration
        location /oauth2/ {
            proxy_pass         http://marquez-web-oauth2-proxy.data-lineage.svc.cluster.local:4180;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Scheme $scheme;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # Authentication Start Endpoint
        location /oauth2/start {
            proxy_pass          http://marquez-web-oauth2-proxy:4180/start;
            proxy_set_header    Host                   $host;
            proxy_set_header    X-Real-IP              $remote_addr;
            proxy_set_header    X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto      https;
            proxy_set_header    X-Auth-Request-Redirect $request_uri;
        }

        # OAuth2 Authentication Request
        location /oauth2/auth {
            internal;
            proxy_pass          http://marquez-web-oauth2-proxy:4180/auth;
            proxy_set_header    Host             $host;
            proxy_set_header    X-Real-IP        $remote_addr;
            proxy_set_header    X-Scheme         $scheme;
            proxy_set_header    Content-Length   "";
            proxy_pass_request_body off;
        }

        # Sign-Out Endpoint
        location /logout {
            proxy_pass http://marquez-web-oauth2-proxy:4180/sign_out?rd=https://staging-marquez-web.nubank.world;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }

        # Protect Frontend Routes
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start;
            proxy_pass         http://marquez-web-ui:80;
            auth_request_set $email  $upstream_http_x_auth_request_email;
            proxy_set_header X-Email $email;
            auth_request_set $x_okta_user $upstream_http_x_auth_request_preferred_username;
            proxy_set_header X-Forwarded-User $x_okta_user;
            auth_request_set $token  $upstream_http_x_auth_request_access_token;
            proxy_set_header X-Access-Token $token;
            auth_request_set $groups  $upstream_http_x_auth_request_groups;
            proxy_set_header X-Forwarded-Groups $groups;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1; 
        }
    }
}