services:
# marquez-web
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: marquez-web
    environment:
      - MARQUEZ_HOST=marquez-api
      - MARQUEZ_PORT=5000
      - WEB_PORT=3000
    expose:
      - "3000"
    stdin_open: true
    tty: true
    depends_on:
      - api
    networks:
      - app-network

# marquez-web-server
  marquez-caddy-s3:
    build:
      dockerfile: ./caddy-s3/Dockerfile
    container_name: marquez-caddy-s3
    ports:
      - "9091:9091"
    environment:
      - CADDY_S3_BUCKET=
      - CADDY_S3_REGION=westus2
    depends_on:
      - web
    networks:
      - app-network

  # Vouch proxy
  vouch-proxy:
    build:
      context: ./vouch-proxy/oauth2-proxy
      dockerfile: Dockerfile
    container_name: vouch-proxy
    # volumes:
    #   - ./docker/oauth2-proxy/oauth2_proxy.cfg:/etc/oauth2_proxy.cfg
    ports:
      - "9090:9090"
    env_file:
      - .env
    depends_on:
      - web
      - marquez-web-server
    networks:
      - app-network

  nginx-proxy:
    build:
      context: ./nginx/nginx
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    # environment:
    #   - BASIC_AUTH_USER=testuser
    #   - BASIC_AUTH_PASSWORD=password
    depends_on:
      - vouch-proxy
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
